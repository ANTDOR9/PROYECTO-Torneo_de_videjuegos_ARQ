<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQP Gaming — Torneos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    nav {
      background: #111;
      border-bottom: 2px solid #cc0000;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    nav .logo {
      font-size: 1.6rem;
      font-weight: 900;
      color: #cc0000;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    nav .logo span { color: #fff; }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav ul a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav ul a:hover { color: #cc0000; }

    .btn-perfil {
      background: transparent;
      border: 1px solid #cc0000;
      color: #cc0000;
      padding: 6px 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-perfil:hover { background: #cc0000; color: #fff; }

    /* HERO */
    .hero {
      position: relative;
      height: 500px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-fondo {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .video-fondo iframe {
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: scale(1.5);
    }
    .video-fondo video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    }

    .video-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.65);
      border-bottom: 2px solid #cc0000;
    }

    .hero-contenido {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-contenido h1 {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .hero-contenido h1 span { color: #cc0000; }

    .hero-contenido p {
      color: #888;
      margin-top: 12px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .hero-contenido .btn-nuevo {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 32px;
      background: #cc0000;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .hero-contenido .btn-nuevo:hover { background: #ff0000; }

    /* CONTENIDO */
    .contenido {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .seccion-titulo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #cc0000;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .seccion-titulo::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .torneos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .torneo-card {
      background: #111;
      border: 1px solid #222;
      border-top: 3px solid #cc0000;
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .torneo-card:hover {
      border-color: #cc0000;
      transform: translateY(-3px);
    }

    .torneo-card .juego {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #cc0000;
      margin-bottom: 8px;
    }

    .torneo-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .torneo-card .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .torneo-card .fecha {
      font-size: 0.8rem;
      color: #666;
    }

    .estado {
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .estado-inscripcion { background: rgba(0,200,100,0.15); color: #00c864; }
    .estado-en-curso    { background: rgba(204,0,0,0.15);   color: #cc0000; }
    .estado-finalizado  { background: rgba(100,100,100,0.15); color: #666; }

    .premio {
      font-size: 1rem;
      font-weight: 700;
      color: #ffcc00;
      margin-top: 8px;
    }

    .loading {
      text-align: center;
      color: #444;
      padding: 60px;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .empty {
      text-align: center;
      color: #444;
      padding: 60px;
      border: 1px dashed #222;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">AQP<span>Gaming</span></div>
  <ul id="nav-links">
    <li><a href="index.html">Torneos</a></li>
    <li><a href="equipos.html">Equipos</a></li>
    <li id="nav-admin"></li>
    <li id="nav-sesion"></li>
  </ul>
</nav>

<div class="hero">
 <div class="video-fondo">
  <video autoplay muted loop playsinline>
    <source src="../assets/fondo.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
</div>
  <div class="hero-contenido">
    <h1>Liga de <span>eSports</span> Arequipa</h1>
    <p>Compite. Domina. Gana.</p>
    <a href="registro.html" class="btn-nuevo" id="btn-hero">Unirse ahora</a>
  </div>
</div>

<div class="contenido">
  <div class="seccion-titulo">Torneos Activos</div>
  <div class="torneos-grid" id="torneos-grid">
    <div class="loading">Cargando torneos...</div>
  </div>
</div>

<script>
  const API = 'https://proyecto-torneodevidejuegosarq-production.up.railway.app/api';

function configurarNavbar() {
  const jugadorData = localStorage.getItem('jugador');
  const navSesion = document.getElementById('nav-sesion');
  const navAdmin = document.getElementById('nav-admin');

  if (jugadorData) {
    const jugador = JSON.parse(jugadorData);
    navSesion.innerHTML = `<a href="perfil.html" class="btn-perfil">👤 ${jugador.gamertag}</a>`;
    if (navAdmin && (jugador.rol === 'admin' || jugador.rol === 'super_admin')) {
      navAdmin.innerHTML = `<a href="admin.html">Admin</a>`;
    }
  } else {
    navSesion.innerHTML = `<a href="login.html" class="btn-perfil">Iniciar sesión</a>`;
  }
}

  async function cargarTorneos() {
    const grid = document.getElementById('torneos-grid');
    try {
      const res = await fetch(`${API}/torneos`);
      const torneos = await res.json();

      if (torneos.length === 0) {
        grid.innerHTML = '<div class="empty">No hay torneos disponibles aún.</div>';
        return;
      }

      grid.innerHTML = torneos.map(t => `
        <a class="torneo-card" href="torneo.html?id=${t.id}">
          <div class="juego">${t.videojuego}</div>
          <h3>${t.nombre}</h3>
          ${t.premio_total ? `<div class="premio">S/ ${t.premio_total.toFixed(2)}</div>` : ''}
          <div class="info">
            <span class="fecha">📅 ${t.fecha_inicio}</span>
            <span class="estado estado-${t.estado.toLowerCase().replace(' ','-')}">${t.estado}</span>
          </div>
        </a>
      `).join('');
    } catch(e) {
      grid.innerHTML = '<div class="empty">Error al cargar torneos. Verifica que el servidor esté corriendo.</div>';
    }
  }

  configurarNavbar();
  cargarTorneos();
</script>

</body>
</html>
