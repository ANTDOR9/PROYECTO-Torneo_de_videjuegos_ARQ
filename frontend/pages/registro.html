<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQP Gaming — Registro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: #111;
      border-bottom: 2px solid #cc0000;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav .logo {
      font-size: 1.6rem;
      font-weight: 900;
      color: #cc0000;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    nav .logo span { color: #fff; }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
    }

    nav ul a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav ul a:hover { color: #cc0000; }

    .contenedor {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: radial-gradient(ellipse at center, #1a0000 0%, #0a0a0a 70%);
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-top: 3px solid #cc0000;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    .card h2 {
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .card h2 span { color: #cc0000; }

    .card p {
      color: #555;
      font-size: 0.85rem;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .fila {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .campo {
      margin-bottom: 20px;
    }

    .campo label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .campo input,
    .campo select {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .campo input:focus,
    .campo select:focus {
      border-color: #cc0000;
    }

    .campo select option {
      background: #111;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #cc0000;
      color: #fff;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn:hover { background: #ff0000; }

    .mensaje {
      margin-top: 16px;
      padding: 12px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .mensaje.error {
      background: rgba(204,0,0,0.15);
      color: #ff4444;
      border: 1px solid #cc0000;
    }

    .mensaje.exito {
      background: rgba(0,200,100,0.15);
      color: #00c864;
      border: 1px solid #00c864;
    }

    .link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: #555;
    }

    .link a {
      color: #cc0000;
      text-decoration: none;
    }

    .link a:hover { color: #ff0000; }
  </style>
</head>
<body>

<nav>
  <div class="logo">AQP<span>Gaming</span></div>
  <ul>
    <li><a href="index.html">Torneos</a></li>
    <li><a href="equipos.html">Equipos</a></li>
    <li><a href="login.html">Iniciar Sesión</a></li>
  </ul>
</nav>

<div class="contenedor">
  <div class="card">
    <h2>Crear <span>Cuenta</span></h2>
    <p>Únete a la liga de eSports de Arequipa</p>

    <div class="fila">
      <div class="campo">
        <label>Gamertag</label>
        <input type="text" id="gamertag" placeholder="TuNick123">
      </div>
      <div class="campo">
        <label>Rango</label>
        <select id="rango">
          <option value="">Sin rango</option>
          <option value="Bronce">Bronce</option>
          <option value="Plata">Plata</option>
          <option value="Oro">Oro</option>
          <option value="Platino">Platino</option>
          <option value="Diamante">Diamante</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre real">
    </div>

    <div class="campo">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com">
    </div>

    <div class="campo">
      <label>Videojuego principal</label>
      <select id="videojuego"></select>
    </div>

    <div class="campo">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
    </div>

    <button class="btn" onclick="registrarse()">Crear cuenta</button>

    <div class="mensaje" id="mensaje"></div>

    <div class="link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000/api';

  async function cargarVideojuegos() {
    const select = document.getElementById('videojuego');
    try {
      const res = await fetch(`${API}/videojuegos`);
      const juegos = await res.json();
      juegos.forEach(j => {
        const opt = document.createElement('option');
        opt.value = j.id;
        opt.textContent = j.nombre;
        select.appendChild(opt);
      });
    } catch(e) {
      console.error('Error cargando videojuegos');
    }
  }

  async function registrarse() {
    const gamertag = document.getElementById('gamertag').value;
    const nombre = document.getElementById('nombre').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const rango = document.getElementById('rango').value;
    const id_videojuego = parseInt(document.getElementById('videojuego').value);

    if (!gamertag || !nombre || !email || !password) {
      mostrarMensaje('Completa todos los campos obligatorios', 'error');
      return;
    }

    if (password.length < 6) {
      mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error');
      return;
    }

    try {
      const res = await fetch(`${API}/registro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ gamertag, nombre, email, password, rango, id_videojuego })
      });

      const data = await res.json();

      if (data.error) {
        mostrarMensaje(data.error, 'error');
        return;
      }

      mostrarMensaje('¡Cuenta creada! Redirigiendo al login...', 'exito');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);

    } catch(e) {
      mostrarMensaje('Error al conectar con el servidor', 'error');
    }
  }

  function mostrarMensaje(texto, tipo) {
    const msg = document.getElementById('mensaje');
    msg.textContent = texto;
    msg.className = `mensaje ${tipo}`;
    msg.style.display = 'block';
  }

  cargarVideojuegos();
</script>

</body>
</html>
